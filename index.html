<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Records</title>
<style>
/* --- Global styles --- */
html, body{
  margin:0;
  padding:0;
  background:#d9d9d9;
  font-family:sans-serif;
  height:100%;
  overflow:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}
*{-webkit-tap-highlight-color:transparent;}

.empty{
  color:#555;
  font-size:14px;
  text-align:center;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* --- Loader global --- */
#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:200;
}
.spinner{
  border:6px solid #eee;
  border-top:6px solid #333;
  border-radius:50%;
  width:50px;
  height:50px;
  animation: spin 1s linear infinite;
}
@keyframes spin{
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* --- Plus button --- */
.plus-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  background:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  cursor:pointer;
  z-index:10;
}
.plus-btn svg{
  width:28px;
  height:28px;
  fill:black;
  transition:transform 0.3s;
}

/* --- Form --- */
.dynamic-form{
  position:fixed;
  top:0;
  right:0;
  height:100%;
  width:350px;
  background:white;
  box-shadow:-4px 0 20px rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  padding:20px;
  gap:15px;
  transform:translateX(100%);
  transition:transform 0.3s;
  justify-content:center;
}
.dynamic-form.show{transform:translateX(0);}
.image-container{
  display:flex;
  align-items:center;
  gap:10px;
}
.add-image-btn{
  width:60px;
  height:60px;
  background:#eee;
  border:1px solid #ccc;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  overflow:hidden;
  transition:border 0.3s;
}
.add-image-btn.invalid{
  border:2px solid red;
}
.add-image-btn span{
  position:absolute;
  left:70px;
  color:#555;
  font-size:14px;
}
.img-preview{
  width:60px;
  height:60px;
  border:1px solid #ccc;
  border-radius:8px;
  object-fit:cover;
  display:none;
}
.dynamic-form input[type=file]{display:none;}
.dynamic-form input{
  border:1px solid #ccc;
  border-radius:8px;
  padding:8px;
  transition:border 0.3s;
}
.dynamic-form input.invalid{
  border:2px solid red;
}
.dynamic-form button.submit{
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
  padding:8px;
  cursor:pointer;
}

/* --- Popup --- */
.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
.popup{
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:90%;
}
.popup .actions{
  display:flex;
  justify-content:space-around;
}
.popup button{
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
}
.oui{background:red;color:white;}
.non{background:#333;color:white;}

/* --- List --- */
h1{
  text-align:center;
  margin-top:10px;
  color:#333;
}
.message-list{
  list-style:none;
  padding:0;
  width:100%;
  max-width:600px;
  margin:10px auto 30px auto;
  max-height:calc(100vh - 100px);
  overflow-y:auto;
  padding-bottom:30px;
}
.message{
  display:flex;
  align-items:center;
  background:white;
  margin-bottom:15px;
  padding:10px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  width:90%;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
  cursor:pointer;
  position:relative;
}
.message img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:12px;
  margin-right:15px;
  display:none;
}
.img-loader{
  position:absolute;
  left:0; top:0;
  width:60px; height:60px;
  border-radius:12px;
  background:rgba(255,255,255,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}
.img-loader .spinner{
  width:20px;
  height:20px;
  border-width:3px;
}

/* --- Modal --- */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:100;
  overflow:auto;
}
.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:90%;
  max-height:90%;
  text-align:center;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
}
.modal-content img{
  max-width:100%;
  max-height:70vh;
  height:auto;
  width:auto;
  object-fit:contain;
  margin-top:10px;
}
.close{
  position:absolute;
  top:10px;
  right:15px;
  font-size:24px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- Loader global -->
<div id="loader">
  <div class="spinner"></div>
</div>

<div class="empty" id="emptyMsg">Aucun records</div>
<h1>RECORDS</h1>
<ul class="message-list" id="messageList"></ul>

<div class="plus-btn" id="plusBtn">
<svg viewBox="0 0 24 24" id="svgIcon">
<path d="M11 5h2v14h-2z"/>
<path d="M5 11h14v2H5z"/>
</svg>
</div>

<div class="popup-overlay" id="popupOverlay">
<div class="popup">
<div>Voulez-vous annuler ?</div>
<div class="actions">
<button class="non" id="nonBtn">Non</button>
<button class="oui" id="ouiBtn">Oui</button>
</div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" id="closeModal">&times;</span>
<div id="modalPseudo" style="font-weight:bold"></div>
<div id="modalScore"></div>
<img id="modalImg">
</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://ewmkchquuaenftefgokr.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3bWtjaHF1dWFlbmZ0ZWZnb2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1ODk1MDMsImV4cCI6MjA4OTE2NTUwM30.t-JN5k3-ByycVNfaE62-NOJCbcpnHf1v0YoQ3926ebo'
const supabase = createClient(supabaseUrl, supabaseKey)

// DOM
const plusBtn = document.getElementById("plusBtn")
const svgIcon = document.getElementById("svgIcon")
const popupOverlay = document.getElementById("popupOverlay")
const ouiBtn = document.getElementById("ouiBtn")
const nonBtn = document.getElementById("nonBtn")
const emptyMsg = document.getElementById("emptyMsg")
let formOpen = false
let dynamicForm = null
const messageList = document.getElementById("messageList")
const modal = document.getElementById("modal")
const closeModal = document.getElementById("closeModal")
const modalPseudo = document.getElementById("modalPseudo")
const modalScore = document.getElementById("modalScore")
const modalImg = document.getElementById("modalImg")
const loader = document.getElementById("loader")

// --- Form ---
function createForm(){
  dynamicForm = document.createElement("div")
  dynamicForm.className = "dynamic-form"
  dynamicForm.innerHTML = `
    <div class="image-container">
      <div class="add-image-btn">IMG <span>Aucune image ajoutée</span></div>
      <img class="img-preview">
    </div>
    <input type="file" accept="image/*">
    <input type="text" placeholder="Pseudo">
    <input type="number" placeholder="Score">
    <button class="submit">Ajouter</button>
  `
  document.body.appendChild(dynamicForm)

  const addBtn = dynamicForm.querySelector(".add-image-btn")
  const fileInput = dynamicForm.querySelector("input[type=file]")
  const preview = dynamicForm.querySelector(".img-preview")
  const status = addBtn.querySelector("span")
  const pseudoInput = dynamicForm.querySelectorAll("input")[1]
  const scoreInput = dynamicForm.querySelectorAll("input")[2]
  const submitBtn = dynamicForm.querySelector(".submit")

  addBtn.onclick = () => fileInput.click()
  fileInput.onchange = () => {
    if(fileInput.files.length){
      status.style.display="none"
      addBtn.classList.remove("invalid")
      const reader = new FileReader()
      reader.onload = e => { preview.src = e.target.result; preview.style.display="block" }
      reader.readAsDataURL(fileInput.files[0])
    }
  }
  pseudoInput.oninput = () => pseudoInput.classList.remove("invalid")
  scoreInput.oninput = () => scoreInput.classList.remove("invalid")

  submitBtn.onclick = async () => {
    let valid = true
    if(!fileInput.files.length){addBtn.classList.add("invalid"); valid=false} else addBtn.classList.remove("invalid")
    if(!pseudoInput.value.trim()){pseudoInput.classList.add("invalid"); valid=false} else pseudoInput.classList.remove("invalid")
    if(!scoreInput.value.trim()){scoreInput.classList.add("invalid"); valid=false} else scoreInput.classList.remove("invalid")
    if(!valid) return

    const pseudo = pseudoInput.value.trim()
    const score = parseFloat(scoreInput.value.trim())
    const img = preview.src

    loader.style.display="flex"

    const { data, error } = await supabase.from('records').insert([{ pseudo, score, image_url: img }])
    if(error){ alert("Erreur: " + error.message); loader.style.display="none"; return }

    const tempImg = new Image()
    tempImg.src = img
    tempImg.onload = () => {
      addRecord(pseudo, score, img)
      loader.style.display="none"
      removeForm()
    }
  }
  requestAnimationFrame(()=>dynamicForm.classList.add("show"))
  svgIcon.style.transform="rotate(45deg)"
  formOpen = true
}

function removeForm(){
  if(dynamicForm){
    dynamicForm.classList.remove("show")
    setTimeout(()=>{dynamicForm.remove(); dynamicForm=null},300)
  }
  svgIcon.style.transform="rotate(0deg)"
  formOpen=false
}

plusBtn.onclick = () => { if(!formOpen) createForm(); else popupOverlay.style.display="flex" }
ouiBtn.onclick = () => { popupOverlay.style.display="none"; removeForm() }
nonBtn.onclick = () => popupOverlay.style.display="none"

// --- Ajouter record avec loader sur mini-aperçu ---
function addRecord(pseudo, score, img){
  const li = document.createElement("li")
  li.className = "message"
  li.dataset.score = score
  li.innerHTML = `
    <div class="img-loader"><div class="spinner"></div></div>
    <img src="${img}">
    <div class="message-text">
      <div class="pseudo">${pseudo}</div>
      <div class="score">${score}</div>
    </div>
  `
  const messageImg = li.querySelector("img")
  const imgLoader = li.querySelector(".img-loader")

  messageImg.onload = () => {
    imgLoader.style.display = "none"
    messageImg.style.display = "block"
  }

  li.onclick = () => { modal.style.display="flex"; modalPseudo.textContent=pseudo; modalScore.textContent=score; modalImg.src=img }
  messageList.appendChild(li)
  sortListDesc()
  emptyMsg.style.display="none"
  messageList.scrollTop = messageList.scrollHeight
}

function sortListDesc(){
  const items = Array.from(messageList.querySelectorAll("li"))
  items.sort((a,b)=>parseFloat(b.dataset.score)-parseFloat(a.dataset.score))
  items.forEach(item=>messageList.appendChild(item))
}

closeModal.onclick = () => modal.style.display="none"
window.onclick = e => { if(e.target===modal) modal.style.display="none" }

// --- Charger les records avec loader global ---
async function loadRecords(){
  loader.style.display="flex"
  const { data, error } = await supabase.from('records').select('*').order('score',{ascending:false})
  loader.style.display="none"
  if(error){ console.error(error); return }
  if(data.length===0){ emptyMsg.style.display="block" }
  data.forEach(r=>addRecord(r.pseudo,r.score,r.image_url))
}

loadRecords()
</script>
</body>
  </html>
