<!DOCTYPE html>  
<html lang="fr">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Records</title>  
<style>  
html, body{  
  margin:0;  
  padding:0;  
  background:#d9d9d9;  
  font-family:sans-serif;  
  height:100%;  
  overflow:hidden;  
}  
body{  
  display:flex;  
  flex-direction:column;  
  align-items:center;  
  min-height:100vh;  
}  
*{-webkit-tap-highlight-color:transparent;}  

.empty{  
  color:#555;  
  font-size:14px;  
  text-align:center;  
  position:fixed;  
  top:50%;  
  left:50%;  
  transform:translate(-50%,-50%);  
}  

#loader{  
  position:fixed;  
  top:0;  
  left:0;  
  width:100%;  
  height:100%;  
  background:rgba(255,255,255,0.9);  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  z-index:200;  
}  
.spinner{  
  border:6px solid #eee;  
  border-top:6px solid #333;  
  border-radius:50%;  
  width:50px;  
  height:50px;  
  animation: spin 1s linear infinite;  
}  
@keyframes spin{  
  0% { transform: rotate(0deg);}  
  100% { transform: rotate(360deg);}  
}  

/* Boutons flottants */
.plus-btn, .settings-btn{  
  position:fixed;  
  bottom:25px;  
  width:60px;  
  height:60px;  
  background:white;  
  border-radius:50%;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  box-shadow:0 6px 15px rgba(0,0,0,0.2);  
  cursor:pointer;  
  z-index:10;  
}  

.plus-btn{ right:25px; }  
.settings-btn{ left:25px; }  

.plus-btn svg, .settings-btn svg{  
  width:28px;  
  height:28px;  
  fill:black;  
  transition:transform 0.3s;  
}  

/* Form */
.dynamic-form{  
  position:fixed;  
  top:0;  
  right:0;  
  height:100%;  
  width:350px;  
  background:white;  
  box-shadow:-4px 0 20px rgba(0,0,0,0.25);  
  display:flex;  
  flex-direction:column;  
  padding:20px;  
  gap:15px;  
  transform:translateX(100%);  
  transition:transform 0.3s;  
  justify-content:center;  
}  
.dynamic-form.show{transform:translateX(0);}  

.image-container{  
  display:flex;  
  align-items:center;  
  gap:10px;  
}  

.add-image-btn{  
  width:60px;  
  height:60px;  
  background:#eee;  
  border:1px solid #ccc;  
  border-radius:8px;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  cursor:pointer;  
  font-weight:bold;  
  position:relative;  
  overflow:hidden;  
}  

.add-image-btn.invalid{ border:2px solid red; }  

.add-image-btn span{  
  position:absolute;  
  left:70px;  
  color:#555;  
  font-size:14px;  
}  

.img-preview{  
  width:60px;  
  height:60px;  
  border:1px solid #ccc;  
  border-radius:8px;  
  object-fit:cover;  
  display:none;  
}  

.dynamic-form input[type=file]{display:none;}  

.dynamic-form input{  
  border:1px solid #ccc;  
  border-radius:8px;  
  padding:8px;  
}  

.dynamic-form input.invalid{ border:2px solid red; }  

.dynamic-form button.submit{  
  background:#333;  
  color:white;  
  border:none;  
  border-radius:8px;  
  padding:8px;  
  cursor:pointer;  
}  

/* Liste */
h1{ text-align:center; margin-top:10px; color:#333; }  

.message-list{  
  list-style:none;  
  padding:0;  
  width:100%;  
  max-width:600px;  
  margin:10px auto 30px auto;  
  max-height:calc(100vh - 100px);  
  overflow-y:auto;  
}  

.message{  
  display:flex;  
  align-items:center;  
  background:white;  
  margin-bottom:15px;  
  padding:10px;  
  border-radius:8px;  
  box-shadow:0 2px 6px rgba(0,0,0,0.1);  
  width:90%;  
  max-width:500px;  
  margin-left:auto;  
  margin-right:auto;  
  cursor:pointer;  
  position:relative;  
}  

.message img{  
  width:60px;  
  height:60px;  
  object-fit:cover;  
  border-radius:12px;  
  margin-right:15px;  
  display:none;  
}  

.img-loader{  
  position:absolute;  
  left:0; top:0;  
  width:60px; height:60px;  
  border-radius:12px;  
  background:rgba(255,255,255,0.7);  
  display:flex;  
  justify-content:center;  
  align-items:center;  
}  

.img-loader .spinner{  
  width:20px;  
  height:20px;  
  border-width:3px;  
}  

.modal{  
  display:none;  
  position:fixed;  
  top:0;  
  left:0;  
  width:100%;  
  height:100%;  
  background:rgba(0,0,0,0.7);  
  justify-content:center;  
  align-items:center;  
  z-index:100;  
}  

.modal-content{  
  background:white;  
  padding:20px;  
  border-radius:10px;  
  max-width:90%;  
  max-height:90%;  
  text-align:center;  
  position:relative;  
}  

.close{  
  position:absolute;  
  top:10px;  
  right:15px;  
  font-size:24px;  
  cursor:pointer;  
}  
</style>  
</head>  

<body>  

<div id="loader"><div class="spinner"></div></div>  

<div class="empty" id="emptyMsg">Aucun records</div>  
<h1>RECORDS</h1>  
<ul class="message-list" id="messageList"></ul>  

<!-- Bouton + -->
<div class="plus-btn" id="plusBtn">  
<svg viewBox="0 0 24 24">  
<path d="M11 5h2v14h-2z"/>  
<path d="M5 11h14v2H5z"/>  
</svg>  
</div>  

<!-- Bouton engrenage -->
<div class="settings-btn" id="settingsBtn">  
<svg viewBox="0 0 24 24">  
<path d="M19.14,12.94a7.43,7.43,0,0,0,.05-.94,7.43,7.43,0,0,0-.05-.94l2.11-1.65a.5.5,0,0,0,.12-.63l-2-3.46a.5.5,0,0,0-.6-.22l-2.49,1a7.28,7.28,0,0,0-1.63-.94l-.38-2.65A.5.5,0,0,0,13.8,2H10.2a.5.5,0,0,0-.49.42L9.33,5.07a7.28,7.28,0,0,0-1.63.94l-2.49-1a.5.5,0,0,0-.6.22l-2,3.46a.5.5,0,0,0,.12.63L4.86,11.06a7.43,7.43,0,0,0-.05.94,7.43,7.43,0,0,0,.05.94L2.75,14.59a.5.5,0,0,0-.12.63l2,3.46a.5.5,0,0,0,.6.22l2.49-1a7.28,7.28,0,0,0,1.63.94l.38,2.65a.5.5,0,0,0,.49.42h3.6a.5.5,0,0,0,.49-.42l.38-2.65a7.28,7.28,0,0,0,1.63-.94l2.49,1a.5.5,0,0,0,.6-.22l2-3.46a.5.5,0,0,0-.12-.63ZM12,15.5A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/>  
</svg>  
</div>  

<script type="module">  
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'  

const supabase = createClient(
  'https://ewmkchquuaenftefgokr.supabase.co',
  'TA_CLE'
)

const messageList = document.getElementById("messageList")
const emptyMsg = document.getElementById("emptyMsg")
const loader = document.getElementById("loader")

function addRecord(pseudo, score, img){
  const li = document.createElement("li")
  li.className = "message"
  li.innerHTML = `
    <div class="img-loader"><div class="spinner"></div></div>
    <img src="${img}">
    <div>
      <div>${pseudo}</div>
      <div>${score}</div>
    </div>
  `
  const imgEl = li.querySelector("img")
  const loaderEl = li.querySelector(".img-loader")

  imgEl.onload = ()=>{
    loaderEl.style.display="none"
    imgEl.style.display="block"
  }

  messageList.appendChild(li)
  emptyMsg.style.display="none"
}

async function loadRecords(){
  loader.style.display="flex"
  const { data } = await supabase.from('records').select('*')
  loader.style.display="none"
  if(!data.length) emptyMsg.style.display="block"
  data.forEach(r=>addRecord(r.pseudo,r.score,r.image_url))
}

loadRecords()

// bouton engrenage (action simple)
document.getElementById("settingsBtn").onclick = ()=>{
  alert("Paramètres (à faire)")
}
</script>  

</body>  
</html>
